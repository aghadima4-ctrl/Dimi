      border-radius: 999px;

  <script>
    function handleCome(){
      // Simpel bekræftelses-flow: åben del-dialog hvis understøttet, ellers alert
      const msg = 'Jeg kommer til Saer & Yacub\'s fest! Dato: 23/7 kl 17:00. Antal: ___';
      if(navigator.share){
        navigator.share({title:'Jeg kommer - Saer & Yacub', text: msg}).catch(()=>alert('Tak! Vi glæder os — husk at sende antal via SMS eller opkald.'));
      } else {
        alert('Tak! Vi glæder os — husk at sende antal via SMS eller opkald.');
